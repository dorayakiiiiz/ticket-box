version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: ticketbox_backend
    ports:
      - "8080:8080"
      - "3000:3000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ticketbox_frontend
    network_mode: "service:backend"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
