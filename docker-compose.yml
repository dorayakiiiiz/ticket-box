version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
    container_name: ticketbox_backend
    ports:
      - "8080:8080"
    env_file:
      - ./src/backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
    container_name: ticketbox_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./src/frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
